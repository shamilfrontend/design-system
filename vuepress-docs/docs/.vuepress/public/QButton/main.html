<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <div class="header">
        <span>Default</span>
      </div>
      <div class="block">
        <q-button type="primary">Primary</q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
        ></q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
          circle
        ></q-button>
        <q-button
          type="primary"
          plain
          >Plain</q-button
        >
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
        ></q-button>
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
          circle
        ></q-button>
        <q-button
          link
          icon="q-icon-question"
        ></q-button>
        <q-button link>Link</q-button>
      </div>
      <div class="header">
        <span>Disabled</span>
      </div>
      <div class="block">
        <q-button disabled>Primary</q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
          disabled
        ></q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
          circle
          disabled
        ></q-button>
        <q-button
          type="primary"
          plain
          disabled
          >Plain</q-button
        >
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
          disabled
        ></q-button>
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
          circle
          disabled
        ></q-button>
        <q-button
          link
          icon="q-icon-question"
          disabled
        ></q-button>
        <q-button
          link
          disabled
          >Link</q-button
        >
      </div>
      <div class="header">
        <span>Loading</span>
      </div>
      <div class="block">
        <q-button
          @click="handleStartLoadingClick"
          :loading="loading"
          >Primary</q-button
        >
        <q-button
          @click="handleStartLoadingClick"
          type="primary"
          icon="q-icon-bell"
          :loading="loading"
        ></q-button>
        <q-button
          @click="handleStartLoadingClick"
          type="primary"
          icon="q-icon-bell"
          circle
          :loading="loading"
        ></q-button>
        <q-button
          @click="handleStartLoadingClick"
          type="primary"
          plain
          :loading="loading"
          >Plain</q-button
        >
        <q-button
          @click="handleStartLoadingClick"
          type="primary"
          plain
          icon="q-icon-question"
          :loading="loading"
        ></q-button>
        <q-button
          @click="handleStartLoadingClick"
          type="primary"
          plain
          icon="q-icon-question"
          circle
          :loading="loading"
        ></q-button>
        <q-button
          @click="handleStartLoadingClick"
          link
          icon="q-icon-question"
          :loading="loading"
        ></q-button>
        <q-button
          @click="handleStartLoadingClick"
          link
          :loading="loading"
          >Link</q-button
        >
      </div>
      <div class="header">
        <span>Small</span>
      </div>
      <div class="block">
        <q-button size="small">Primary</q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
          size="small"
        ></q-button>
        <q-button
          type="primary"
          icon="q-icon-bell"
          size="small"
          circle
        ></q-button>
        <q-button
          type="primary"
          plain
          size="small"
          >Plain</q-button
        >
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
          size="small"
        ></q-button>
        <q-button
          type="primary"
          plain
          icon="q-icon-question"
          size="small"
          circle
        ></q-button>
        <q-button
          link
          icon="q-icon-question"
          size="small"
        ></q-button>
        <q-button
          link
          size="small"
          >Link</q-button
        >
      </div>
    </div>
  </body>
  <script src="https://unpkg.com/vue@latest"></script>
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const App = {
      data() {
        return {
          loading: false
        };
      },
      methods: {
        handleStartLoadingClick() {
          this.loading = true;
          setTimeout(() => {
            this.loading = false;
          }, 1000);
        }
      }
    };
    const app = Vue.createApp(App);
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    .block {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 5px 0 0 20px;
    }

    .header {
      display: flex;
      margin: 10px 0 0 20px;
    }
  </style>
</html>
