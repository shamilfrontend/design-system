<html>
  <head>
    <meta charset="UTF-8" />
    <!-- import CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <div class="block">
        <q-row>
          <q-col cols="6">
            <p>Start week with Monday</p>
            <q-date-picker
              v-model="value"
              :first-day-of-week="1"
            />
          </q-col>
        </q-row>
      </div>
    </div>
  </body>
  <!-- import Vue before Design System -->
  <script src="https://unpkg.com/vue@latest"></script>
  <!-- import JavaScript -->
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const app = Vue.createApp({
      setup() {
        const value = Vue.ref(new Date());

        return { value };
      }
    });

    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    .block {
      margin: 20px;
    }
  </style>
</html>
