<html>
  <head>
    <meta charset="UTF-8" />
    <!-- import CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <q-checkbox
        label="Disabled"
        disabled
      />
    </div>
  </body>
  <!-- import Vue before Design System -->
  <script src="https://unpkg.com/vue@latest"></script>
  <!-- import JavaScript -->
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const app = Vue.createApp({});
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    #app {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 25px;
    }
  </style>
</html>
