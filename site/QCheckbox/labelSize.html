<html>
  <head>
    <meta charset="UTF-8" />
    <!-- import CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <q-checkbox
        v-model="model"
        label="Label"
        label-size="small"
      />
    </div>
  </body>
  <!-- import Vue before Design System -->
  <script src="https://unpkg.com/vue@latest"></script>
  <!-- import JavaScript -->
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const App = {
      data() {
        const { ref } = Vue;

        const model = ref(true);

        return { model };
      }
    };

    const app = Vue.createApp(App);
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    #app {
      padding: 25px;
    }
  </style>
</html>
