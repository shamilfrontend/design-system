<html>
  <head>
    <meta charset="UTF-8" />
    <!-- import CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <div class="block">
        <q-switch
          :model-value="false"
          disabled
        ></q-switch>
      </div>
      <div class="block">
        <q-switch
          :model-value="true"
          disabled
        ></q-switch>
      </div>
    </div>
  </body>
  <!-- import Vue before Design System -->
  <script src="https://unpkg.com/vue@latest"></script>
  <!-- import JavaScript -->
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const app = Vue.createApp({});
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    #app {
      display: flex;
    }

    .block {
      margin: 20px;
    }
  </style>
</html>
