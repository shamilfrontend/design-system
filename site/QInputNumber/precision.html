<html>
  <head>
    <meta charset="UTF-8" />
    <!-- import CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <div class="block">
        <q-input-number
          v-model="value"
          :precision="2"
        />
      </div>
    </div>
  </body>
  <!-- import Vue before Design System -->
  <script src="https://unpkg.com/vue@latest"></script>
  <!-- import JavaScript -->
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const app = Vue.createApp({
      setup() {
        const value = Vue.ref(123456.78);

        return { value };
      }
    });

    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    .block {
      display: flex;
      flex-direction: column;
      width: 450px;
      margin: 20px;
    }
  </style>
</html>
