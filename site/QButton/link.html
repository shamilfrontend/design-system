<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../design-system/fonts/fonts.css" />
    <link rel="stylesheet" href="../design-system/icons/icons.css" />
    <link rel="stylesheet" href="../design-system/design-system.css" />
  </head>

  <body>
    <div id="app">
      <div class="button-example">
        <p class="label">Basic link button</p>
        <div class="button-row">
          <q-button type="default" link>plain</q-button>
          <q-button type="primary" link>primary</q-button>
          <q-button type="success" link>success</q-button>
          <q-button type="info" link>info</q-button>
          <q-button type="warning" link>warning</q-button>
          <q-button type="danger" link>danger</q-button>
        </div>

        <p class="label">Disabled link button</p>
        <div class="button-row">
          <q-button type="default" link disabled>plain</q-button>
          <q-button type="primary" link disabled>primary</q-button>
          <q-button type="success" link disabled>success</q-button>
          <q-button type="info" link disabled>info</q-button>
          <q-button type="warning" link disabled>warning</q-button>
          <q-button type="danger" link disabled>danger</q-button>
        </div>
      </div>
    </div>
  </body>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../design-system/design-system.umd.js"></script>
  <script>
    const app = Vue.createApp({});
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>

  <style>
    body {
      margin: 0;
      background: #f8f7fa;
    }

    .button-example {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 20px;
    }

    .label {
      margin: 0;
      font-size: 14px;
      color: #6e6b7b;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .button-row > * {
      margin: 0;
    }
  </style>
</html>
