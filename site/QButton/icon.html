<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../design-system/fonts/fonts.css" />
    <link rel="stylesheet" href="../design-system/icons/icons.css" />
    <link rel="stylesheet" href="../design-system/design-system.css" />
  </head>

  <body>
    <div id="app">
      <div class="button-row">
        <q-button type="primary" icon="q-icon-cog-stroke" ></q-button>
        <q-button type="primary" icon="q-icon-chain" ></q-button>
        <q-button type="primary" icon="q-icon-trash-bin" ></q-button>
        <q-button type="primary" icon="q-icon-search">Search</q-button>
        <q-button type="primary" icon="q-icon-cloud-upload">Upload</q-button>
      </div>
    </div>
  </body>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../design-system/design-system.umd.js"></script>
  <script>
    const app = Vue.createApp({});
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>

  <style>
    body {
      margin: 0;
      background: #f8f7fa;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      padding: 20px;
    }

    .button-row > * {
      margin: 0;
    }
  </style>
</html>
