<html>
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/design-system/styles"
    />
  </head>

  <body>
    <div id="app">
      <div class="block">
        <q-button type="primary" plain>Plain</q-button>
        <q-button type="primary" plain icon="q-icon-bell" ></q-button>
      </div>
    </div>
  </body>
  <script src="https://unpkg.com/vue@latest"></script>
  <script src="https://unpkg.com/design-system@latest"></script>
  <script>
    const app = Vue.createApp({});
    app.use(DesignSystem.default);
    app.mount('#app');
  </script>
  <style>
    .block {
      display: flex;
      gap: 12px;
      width: 160px;
      margin: 20px 0 0 20px;
    }
  </style>
</html>
